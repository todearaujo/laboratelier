<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0A0E1A">
  <title>laboratelier — Todinho @ Mundo</title>
  <meta name="description" content="Dois modelos, o mesmo desafio: Todinho @ Mundo, feito por Claude e por ChatGPT.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230a0e1a'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%2338e1ff' stroke-width='1.4' opacity='.7'/%3E%3Cpath d='M16 7l1.8 4.7 5 .3-3.9 3.2 1.3 4.9L16 17.6l-4.2 2.7 1.3-4.9L9.2 12l5-.3z' fill='%23f5c451'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink-0:#0a0e1a;--ink-1:#111a2e;--fg:#eaeef7;--muted:#8a96b0;--cyan:#38e1ff;--gold:#f5c451;
      --surface:rgba(255,255,255,.04);--hair:rgba(255,255,255,.10);--hair2:rgba(255,255,255,.18);}
    *{box-sizing:border-box}html{height:100%;background:var(--ink-0)}
    body{margin:0;min-height:100%;color:var(--fg);font-family:"Inter",system-ui,sans-serif;
      background:radial-gradient(120% 90% at 50% -10%,#16223d,var(--ink-1) 38%,var(--ink-0)) fixed;
      display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
      padding:48px 22px;gap:6px;-webkit-font-smoothing:antialiased}
    .grid{position:fixed;inset:0;pointer-events:none;
      background-image:linear-gradient(rgba(120,140,180,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(120,140,180,.06) 1px,transparent 1px);
      background-size:64px 64px;-webkit-mask-image:radial-gradient(120% 80% at 50% 30%,#000 35%,transparent 92%);mask-image:radial-gradient(120% 80% at 50% 30%,#000 35%,transparent 92%)}
    .brand{position:relative;font-family:"Fraunces",serif;font-weight:600;font-size:clamp(2rem,8vw,3rem);margin:0 0 2px;letter-spacing:-.01em}
    .brand .at{color:var(--cyan);font-style:italic}
    .sub{position:relative;color:var(--muted);margin:0 0 26px;max-width:34ch}
    .cards{position:relative;display:flex;flex-direction:column;gap:14px;width:100%;max-width:380px}
    .card{display:flex;align-items:center;gap:14px;padding:18px 20px;border:1px solid var(--hair);background:var(--surface);
      border-radius:16px;color:var(--fg);text-decoration:none;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
      transition:border-color .2s,background .2s,transform .14s,box-shadow .2s}
    .card:hover{border-color:rgba(56,225,255,.5);background:rgba(56,225,255,.06);transform:translateY(-2px);box-shadow:0 0 24px rgba(56,225,255,.14)}
    .card .badge{font-size:1.5rem}
    .card .t{font-weight:600;font-size:1.05rem}
    .card .d{color:var(--muted);font-size:.84rem}
    .card .arrow{margin-left:auto;color:var(--muted)}
    .card:hover .arrow{color:var(--cyan)}
    .foot{position:relative;margin-top:28px;color:var(--muted);font-size:.84rem}
  </style>
</head>
<body>
  <div class="grid" aria-hidden="true"></div>
  <h1 class="brand">Todinho <span class="at">@</span> Mundo 🌍</h1>
  <p class="sub">O mesmo desafio, por dois modelos. Escolha a versão que quer jogar.</p>
  <nav class="cards" aria-label="Versões">
    <a class="card" href="claude/todinho-world/">
      <span class="badge">✦</span>
      <span><span class="t">Versão Claude</span><br><span class="d">Atlas Noturno · pt · en · es</span></span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
    <a class="card" href="todinho-world/chatgpt/">
      <span class="badge">◆</span>
      <span><span class="t">Versão ChatGPT</span><br><span class="d">pt · en · es</span></span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
  </nav>
  <p class="foot">laboratelier · todearaujo.com</p>
</body>
</html>
