  <title>Todinho @ 🌍 — escolha o idioma · choose your language · elige tu idioma</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <main class="selector">
    <h1 class="brand">Todinho <span class="at">@</span> <span class="globe">🌍</span></h1>

    <nav class="choices" aria-label="Idioma / Language / Idioma">
      <a class="choice" href="pt-br/" lang="pt-BR" data-lang="pt">
        <span class="flag">🇧🇷</span><span class="label">Brasileiro</span><span class="arrow" aria-hidden="true">→</span>
      </a>
      <a class="choice" href="en/" lang="en" data-lang="en">
        <span class="flag">🇺🇸</span><span class="label">English</span><span class="arrow" aria-hidden="true">→</span>
      </a>
      <a class="choice" href="es/" lang="es" data-lang="es">
        <span class="flag">🇪🇸</span><span class="label">Español</span><span class="arrow" aria-hidden="true">→</span>
      </a>
    </nav>

    <p class="tagline">🌍 Muitos apelidos. Um só Tode. 🖖🏻</p>
  </main>

  <script>
    // Realça (sem forçar) a opção que casa com o idioma do navegador.
    (function () {
      var base = (navigator.language || '').slice(0, 2).toLowerCase();
      var map = { pt: 'pt', es: 'es', en: 'en' };
      var t = map[base];
      if (!t) return;
      var opt = document.querySelector('.choice[data-lang="' + t + '"]');
      if (opt) { opt.classList.add('suggested'); opt.setAttribute('aria-current', 'true'); }
    })();
  </script>
</body>
</html>
